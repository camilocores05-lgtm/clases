<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de me gusta</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    
    <div class="like-counter" >
        <h1>¡Dale me gusta!</h1>
        <div class="like-area">
            <button id="likeButton" > <i class="fa-solid fa-heart like-button"></i> </button>

            <span class="like-count" id="likeCount">0</span>
        </div>
        <button id="resetLikeButton" >Resetear</button>
        <small> Haz clic en el corazón para aumentar el contador </small>
    </div>

    <script src="script.js"></script>
</body>
</html>
